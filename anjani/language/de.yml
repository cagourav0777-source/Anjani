admins-help: |
  Zu bequem, um jemanden zum Administrator zu befördern oder zu degradieren?
  Möchtest Du wichtige Infos zum Chat sehen?
  Alle Dinge im Chatraum wie Admin-Listen, Nachrichten anpinnen oder einen Einladungslink erstellen kann der Bot erledigen.\n
