  **Meldung aus: {chat}**
  × **Meldung von: ** {by_user} `{by_user_id}`
  × **Gemeldeter Benutzer: ** {reported_mention} `{reported_id}`
user-not-in-chat: Der Benutzer, den Du zu melden versuchst, ist nicht mehr in dieser Gruppe.
#endregion
#region restrictions
restriction-button: Restriktionen
restriction-help: |
  Benutzer, die spammen, trollen oder stören müssen eingeschränkt werden.
  Mit diesem Plugin können Administratoren unfreundliche Mitglieder einfach einschränken.\n
  **Nur für Administartoren:**
  × /kick <Benutzername> [Anlass]: Wirft einen Benutzer raus. (via Benutzername oder Antwort)
  × /ban <Benutzername> [Anlass]: Sperrt einen Benutzer. (via Benutzername oder Antwort)
  × /sban <Benutzername>: Sperrt einen Benutzer. (via Benutzername oder Antwort)
  × /unban <Benutzername>: Entsperrt einen Benutzer. (via Benutzername oder Antwort)
  × /kickme: Du bist von der Gruppe gelangweilt? Weise den Bot an, Dich rauszuwerfen.
  × /warn <Benutzername> [Anlass]: Verwarnt einen Benutzer. (via Benutzername oder Antwort)
  × /warnlimit <Limit>: Legt die Obergrenze für Verwarnungen fest.
  × /rmwarn <Benutzername>: Entfernt die vorherige Verwarnung an den Benutzer wieder. (via Benutzername oder Antwort)

  **Befehle für Benutzer:**
  × /warns: Erhalte die Daten über Verwarnungen an einen Benutzer. (via Antwort)
