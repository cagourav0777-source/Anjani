#region mute
muting-button: Stummschalten
muting-help: |
  Einige Spammer, Nervensägen oder Trolle müssen diszipliniert werden.
  Mit diesem Plugin kannst einfach jemanden stummschalten.\n
  **Nur für Administartoren:**
  × /mute <Benutzername>: Schalte ein Mitglied in der Supergruppe stumm.
  × /mute <Benutzername> X<m|h|d>: Stelle ein Mitglied temporär für X Zeiteinheiten stumm.
  × /unmute <Benutzername>: Hebt die Stummschaltung für ein Mitglied auf.\n
  Beispiel für temporäre Stummschaltung:
  m = Minuten, h = Stunden und d = Tage.
  `/mute @benutzername 2h`; schaltet einen Benutzer zwei Stunden lang stumm.
