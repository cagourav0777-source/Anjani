#region purge
purges-button: Aufräumen
purges-help: |
  Mit dieser Funktion lassen sich Nachrichten leicht löschen.\n
  **Nur für Administartoren:**
  × /del: Löscht die beantwortete Nachricht.
  × /purge | /prune : Entfernt alle Nachrichten bis zur beantworteten.
