#endregion
#region reporting
reporting-button: Meldefunktion
reporting-help: |
  **Befehle für Administartoren:**
  × /reports <yes/no/on/off>: Meldefunktion aktivieren/deaktivieren.
    - Wenn Du das im Chat ausgeführst, wird die Einstellung für diesen geändert.
    - Wenn Du das in den Direktnachrichten ausgeführst, werden Deine Einstellungen für den Empfang von Meldungen geändert.
  \n**Befehle für Benutzer:**
  × /report: Antworte auf eine Nachricht, um sie den Admins zur Überprüfung zu melden.
  × @admin: gleichbedeutend zu /report.
  \nAntworte einfach auf eine Nachricht mit @admin oder /report. Ich werde dann alle Administratoren über die beantwortete Nachricht informieren.
  **Hinweis** /report und @admin werden nichts auslösen, wenn die Nachricht von einem Administrator stammt.
report-on: Meldefunktion eingeschaltet! Du wirst immer benachrichtigt, wenn etwas in der Gruppe gemeldet wurde.
chat-report-on: Meldefunktion eingeschaltet! Administratoren, die Meldungen eingeschaltet haben, werden benachrichtigt, sobald /report oder @admin verwendet werden.
report-off: Meldefunktion ausgeschaltet! Du wirst keine Berichte von Deiner moderierten Gruppe mehr erhalten.
chat-report-off: Meldefunktion ausgeschaltet! Administratoren werden nicht benachstichtigt, wenn /report oder @admin verwendet wird.
report-setting: "Die Einstellung für die Meldefunktion in diesem Chat ist: `{}`"
chat-report-setting: "Deine Einstellung für die Meldefunktion ist: `{}`"
no-report-user: Wer soll gemeldet werden??
