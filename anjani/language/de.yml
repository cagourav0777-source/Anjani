notes-button: Notizen
notes-help: |
  \nSpeichere Daten als Notizen für die zukünftige Nutzung!\n
  **Befehle für Benutzer:**
  × /get <Notizname>: Erhalte die Notiz mit dem angegebenen Namen.
  × #<Notizname>: gleichbedeutend zu /get.
  × /notes: Listet alle im aktuellen Chat gespeicherten Notizen auf.\n
  **Admin commands:**
  × /save <Notizname> <Text der Notiz>: Speichert eine neue Notiz namens "<Notizname>". Das Beantworten einer Nachricht speichert die beantwortete Nachricht.
  × /clear <Notizname> | /delnote <Notizname>: Löscht die entsprechende Notiz, falls sie existiert.
  \nSiehe /markdownhelp für mehr Informationen über die Formatierung von Notizen.
notes-invalid-args: |
  Du musst auf eine Nachricht antworten, die einen Text enthält, oder einen Text hinter den Notiznamen schreiben.
  Bsp.: /save <Notizname> <Textnachricht / Antwort auf Textnachricht>
