#region lockings
lockings-button: Sperren
lockings-help: |
  Dieses Plugin hilft Dir, die Berechtigungen/Inhaltstypen Deiner Gruppe für Nicht-Admins zu sperren/freizuschalten.\n
  **Befehle für Administartoren:**
  × /lock <Inhaltstypen/Berechtigungen>: Sperrt die angegebenen Inhaltstypen/Berechtigungen für Nicht-Admins.\n
  × /unlock <Inhaltstypen/Berechtigungen>: Wird die gesperrten Inhaltstypen/Berechtigungen in der Gruppe entsperren.\n
  × /locktypes : Zeige die Inhaltstypen/Berechtigungen, welche Du sperren/entsperren kannst.\n
  × /locks : Zeige gesperrte Inhaltstypen/Berechtigungen.\n
