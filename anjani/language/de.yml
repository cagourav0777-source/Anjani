#endregion
#region greetings
greetings-button: Begrüßungen
greetings-help: |
  Die Begrüßungsnachrichten Deiner Gruppe, die auf verschiedene Weise personalisiert werden können.\n
  **Befehle für Administartoren:**
  × /setwelcome <Text> | <Antwort> : Legt eine benutzerdefinierte Begrüßungsnachricht fest.
  × /resetwelcome : Stellt die Begrüßungsnachricht auf Werkseinstellung zurück.
  × /welcome <on/off> : Begrüßungsnachrichten aktivieren/deaktivieren.
  × /welcome : Zeigt die aktuelle Begrüßungsnachricht und zugehörige Einstellungen an.\n
  × /setgoodbye <Text> | <Antwort> : Legt eine benutzerdefinierte Abschiedsnachricht fest.
  × /resetgoodbye : Stellt die Abschiedsnachricht auf Werkseinstellung zurück.
  × /goodbye <on/off> : Abschiedsnachrichten aktivieren/deaktivieren .
  × /goodbye : Zeigt die aktuelle Abschiedsnachricht und zugehörige Einstellungen an.\n
  × /cleanservice <on/off> : Die Infonachrichten von Telegram „Benutzer ist der Gruppe beigetreten“ automatisch löschen.\n
  **Hinweise**:\nUm die Nachricht ohne Formatierung zu erhalten, füge am Ende "noformat" hinzu.
  Beispiel: `/welcome noformat`

  Siehe /markdownhelp und /fillinghelp Für Details zur Formatierung.
greetings-topic-default: |
  Forum erkannt. Bot verwendet das standardmäßige Aktionsthema für Begrüßungsnachrichten.
  Um ein standardmäßiges Aktionsthema festzulegen, lege bitte ein Standard-Aktionsthema fest, wie in diesem Abschnitt beschrieben. [Hilfe zu Themen]({}).
