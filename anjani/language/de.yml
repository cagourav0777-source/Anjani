mute-success-time: Der Benutzer **{}** wird erfolgreich für {} stummgeschaltet!
unmute-done: Stummschaltung aufgehoben!\nDieser Nutzer kann wieder schreiben.
cant-mute-admin: Ich werde einen Admin nicht vom Schreiben abhalten!
self-muting: Ja nee, ist klar! Ich werde mich nicht selbst stummschalten!
