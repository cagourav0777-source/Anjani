  Unzureichende Reputation zum Ausführen einer Vorhersage!.
  Die Vorhersage benötigt {} Reputationspunkte, Du hast bloß {} Reputationspunkte.
  Du kannst Dir mehr Reputation verdienen, indem Du auf @SpamPredictionLog abstimmst.
