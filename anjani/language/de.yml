#region rules
rules-button: Regeln
rules-help: |
  Jeder Chat hat andere Regeln. Dieses Modul soll dabei helfen, diese Regeln klarer zu machen!\n
  × /rules: Erhalte die Regeln eines Chats.\n
  **Nur für Admins:**
  × /setrules <Chat Regeln>: Legt Regeln für den Chat fest.
  × /clearrules: Löscht gespeicherte Regeln eines Chats.\n
  **Hinweise**
  Um einen benutzerdefinierten Link zu den Regeln zu erstellen, benötigst Du lediglich die entsprechende Chat-ID und musst diese in folgenden Link einfügen:
  `t.me/{username}?start=rules_<Chat-ID>`
rules-blank-err: Die Regeln können nicht leer sein!
