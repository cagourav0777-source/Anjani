#endregion
#region spam prediction
spampredict-button: Spam-Prognose
spampredict-help: |
  Zum Hinzufügen entwickeln wir derzeit einen Spam-Schutz mithilfe maschinellen Lernens. Der Bot erkennt und löscht Spam-Nachrichten aus Deinen Chats.
  Du kannst uns auch helfen, unser Modell zu trainieren, indem Du auf @SpamPredictionLog darüber abstimmst. Du wirst einen Reputationspunkt erhalten, der in Zukunft einige Vorteile bringen wird 😉.\n
  **Befehle für Admins:**
  × /spampredict <on/off/yes/no>: Deaktiviert oder aktiviert die Spam-Prognose in Deiner Gruppe.\n
  Wenn dies aktiviert ist, löscht der Bot die Nachricht automatisch und protokolliert sie bei @SpamPredictionLog.\n
  **Befehle für Benutzer:**
  × /predict <Antwort>: Wird für die beantwortete Nachricht prognostizieren, ob es sich um Spam handelt oder nicht*.
  *Das kostet 10 Reputationspunkte
spampredict-set: "Die Spam-Prognose wurde für diesen Chat {} gestellt."
spampredict-view: |
  Einstellung der Spam-Prognose: **{}**.
  Wenn diese Option aktiviert ist, werden als Spam erkannte Nachrichten automatisch gelöscht.
