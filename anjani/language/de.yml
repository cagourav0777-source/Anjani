#region spam shield
spamshield-button: Spam-Schutz
spamshield-help: |
  **Befehle für Administartoren:**
  /spamshield <on/off/yes/no>: Deaktiviert oder aktiviert den Spam-Schutz in Deiner Gruppe.\n
  Der Spam-Schutz verwendet Combot Anti Spam, @Spamwatch API und globale Sperren, um Spammer so weit wie möglich aus Deinem Chat zu entfernen!
