#region federations
federations-button: Föderationen
federations-help: |
  Gruppenmanagement. Der Spaß dauert nur solange bis man Spammer bekommt und sie sperren muss. Dann muss man immer mehr verbieten, und es wird unangenehm.
  Vielleicht hat man sogar mehrere Gruppen und möchten diese Spammer in keiner einzigen davon - Wie kann man damit umgehen? Muss man sie in jeder einzelnen Gruppe manuell sperren?

  Jetzt nicht mehr! Mit Föderationen lässt sich eine Sperre in einem Chat auf all Deine anderen Chats übertragen.
  Du kannst sogar Administratoren für Förderationen ernennen, sodass die vertrauenswürdigsten Admins über alle Gruppen hinweg sperren können, die geschützt werden sollen.

  **Verfügbare Befehle:**
  × /newfed <Name>: Erstelle eine neue Föderation mit dem angegebenen Namen.
  × /delfed <fedID>: Löscht die in Deinem Besitz befindliche Föderation und alle Informationen, die sich darauf beziehen (Dies wird keine gesperrten Nutzer entsperren).
  × /joinfed <fedID>: Nimmt den aktuellen Chat in die angegebene Föderation auf. (**Nur der Inhaber des Chats kann dies tun**)
  × /leavefed <fedID>: Die aktuelle Föderation verlassen. (**Nur der Inhaber des Chats kann dies tun**)
  × /fedinfo: Informationen über die Föderation erhalten.
  × /fedstats | /fstats: Erhalte Informationen über die Sperre eines Benutzers in einer Föderation.
  × /myfeds | /myfed: Listet alle Föderationen auf, in denen Du Administrator bist (nur via Direktnachricht).

  **Befehle für Föderationsinhaber:**
  × /fedpromote | /fpromote: Befördert einen Benutzer zum Admin der Föderation.
  × /feddemote | /fdemote: Degradiert einen Admin der Föderation.
  × /fedbackup: Erhalte eine Sicherungskopie der gesperrten Benutzer einer Föderation als CSV-Datei (nur via Direktnachricht).
  × /fedrestore: Exportiere eine Sicherungsdatei der Föderation, um die Sperrungen wiederherzustellen (nur via Direktnachricht).
  × /subfed <fedID>: Abonniere eine andere Föderation. Anschließend werden die in der abonnierten Föderation verbotenen Benutzer auch in Deiner Föderation verboten.
  Hinweis: Dies hat keine Auswirkungen auf die Banliste Deiner Föderation. Die Verbote der abonnierten Föderation werden lediglich vererbt.
  × /unsubfed <fedID>: Kündigt das Abonnement einer anderen Föderation. Die Sperren aus der anderen Föderation werden damit aufgehoben.
  × /setfedlog: Legt den aktuellen Chat als Ort für den Log der Föderation fest. Alle Ereignisse der Föderation werden hier geloggt.
  × /unsetfedlog: Den Log für die Föderation ausschalten. Die Ereignisse der Föderation werden nicht mehr geloggt.

  **Befehle für Admins einer Föderation:**
  × /fban: Sperrt einen Benutzer oder Kanal für die Föderation des aktuellen Chats.
  × /unfban: Entsperrt einen Benutzer oder Kanal für die Föderation des aktuellen Chats.
  × /fadmins: Erhalte eine Liste von Administratoren der Föderation.
