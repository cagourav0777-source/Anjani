#region topic
topic-button: Themen
topic-help: |
  Telegram-Themen unterteilen Deine Gruppe in verschiedene Chats innerhalb der Gruppe (oder des Forums).
  Mit diesem Plugin kannst Du Deine Themen von Anjani verwalten lassen.

  Ein Thema muss als standardmäßiges "Aktionsthema" festgelegt werden, das dann von Anjani für Begrüßungen und weiteres genutzt wird.

  **Befehle für Administartoren:**
  × /setactiontopic | /setdefaulttopic: Lege das aktuelle Thema als Aktionsthema dieses Forums fest.
  × /actiontopic: Erhalte das aktuelle Aktionsthema von diesem Chat.
  × /createtopic <Themenname>: Erstelle ein neues Thema.
  × /renametopic <Themenname>: Benenne das aktuelle Thema um.
  × /opentopic: Öffne das aktuelle Thema wieder.
  × /closetopic: Schließe das aktuelle Thema.
  × /deletetopic: Lösche das aktuelle Thema.
topic-non-topic: Dies ist keine Themengruppe!
topic-set: Dieses Thema wird ab jetzt für das Aktionsthema verwendet.
topic-action-general: |
  Dieser Chat verwendet derzeit das standardmäßige allgemeine Thema als Aktionsthema.

  Bot-Aktionen wie Begrüßungen, Spam-Schutz usw. werden in dieses Thema gesendet.
topic-action-custom: |
  Dieser Chat verwendet derzeit {} als Aktionsthema.

  Bot-Aktionen wie Begrüßungen, Spam-Schutz usw. werden an dieses Thema gesendet.
topic-remove-confirm: |
  Bist Du sicher, dass Du dieses Thema entfernen möchtest??
  Diese Aktion kann nicht rückgängig gemacht werden!
  Du wirst alle Daten des Themas verlieren und Dein Thema wird dauerhaft gelöscht sein!
