#region misc
miscs-button: Sonstiges
miscs-help: |
  Ein Krimskrams-Modul für kleine, einfache Befehle, die sonst nirgendwo reinpassen.\n
  **Befehle:**
  ×  /id : Erhalte die Benutzer-ID, Nachrichten-ID, Chat-ID und viele weitere.
  ×  /info: Erhalte Infos über den Benutzer.
  ×  /ping : Ermittle die Latenzzeit des Bots.
  ×  /paste <Flaggen> : Füge eine Textdatei in einen Pastebin-Dienst ein.
